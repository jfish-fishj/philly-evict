# ============================================================
# RUN SETTINGS
# ============================================================
run:
  # Toggle to run on a small sample for fast smoke tests (scripts must respect this).
  sample_mode: false
  sample_n: 200000
  seed: 123
  # Name-linking defaults for eviction defendant <-> InfoUSA person linkage.
  year_window: [0]
  # If false, candidate blocking ignores year and InfoUSA is collapsed to familyid+person_num.
  use_year_in_blocking: false
  candidate_cap_k: 50
  # Optional fastLink scheduling chunk size (eviction persons per chunk); null disables.
  fastlink_chunk_evict_n: null
  # Force merge of parsed address components from infousa_clean even when only a small share
  # of InfoUSA rows are missing n_sn_ss_c.
  force_infousa_clean_enrich: false
  # Optional extra downsample in sample_mode: number of eviction cases to keep
  # after loading geo sample files (NULL/empty disables).
  sample_evict_cases_n: null
  # In sample_mode, restrict InfoUSA rows to tracts present in sampled eviction cases.
  restrict_inf_to_evict_tracts: true
  common_surname_quantile: 0.995
  # Geo-driven sampling for eviction<->InfoUSA linkage development.
  # Provide one or more of these in config or via CLI to r/make-link-evictions-infousa-sample.R.
  link_sample_zips: []
  link_sample_tracts: []
  link_sample_bg_geoids: []
  # Time aggregation for retaliatory-evictions.r
  # One of: month, quarter
  retaliatory_time_unit: "quarter"
  # Skip LP-DiD by default; enable explicitly when needed.
  retaliatory_skip_lpdid: true
  # Legacy targeting blocks in retaliatory-evictions.r are opt-in.
  retaliatory_run_legacy_targeting: false
  # Legacy suppression LPM / long-run blocks are opt-in.
  retaliatory_run_legacy_suppression: false
  # Dist-lag % Black split rule: one of mean, median, quantile, p75, p90, p95, or pXX.
  retaliatory_black_split_method: "mean"
  # Used when method == quantile (0-1 scale).
  retaliatory_black_split_quantile: 0.75
  # Aggregation level for building data: "year", "quarter", or "month"
  building_data_agg_level: "year"
  # Transfer-eviction event study frequency: "annual" or "quarterly"
  transfer_eviction_frequency: "annual"
  # Entity linkage settings (build-ownership-panel.R)
  entity_linkage_max_rounds: 5        # max fixed-point rounds for Phase 2 (OPA-only); converges early if stable
  entity_linkage_ra_threshold: 300    # registered-agent filter: exclude addresses linking > N entities
  entity_linkage_diag_threshold: 20   # conglomerates > this many members get bridge-address diagnostics written to QA
  # Default PID filter for complaint suppression scripts (false = use all PIDs)
  use_pid_filter: false
  renter_poverty_geo:
    acs_year: 2015
    state: "PA"
    county: "Philadelphia"
    input_geography: "block_group"
  # Outer sorting baseline simulation controls.
  outer_sorting:
    B: 10000
    Nhood: 300
    seed: 123
    sim_year_from: 2011
    sim_year_to: 2019
    mu: 0.30
    delta_L: 0.01
    delta_H: 0.10
    lam: 0.40
    tol: 1.0e-06
    mass_tol_abs: 1.0e-06
    max_iter: 300
    p_bad_shape1: 2.0
    p_bad_shape2: 6.0
    units_draw_mode: "empirical_resample"
    units_empirical_product_key: "bldg_panel_blp"
    units_empirical_year_from: 2011
    units_empirical_year_to: 2019
    units_empirical_year_built_col: "year_built"
    # Legacy fallback only; ignored when units_draw_mode == "empirical_resample".
    units_bin_values: [1, 2, 3, 4, 7, 15, 35, 75]
    units_bin_probs: [0.28, 0.16, 0.10, 0.08, 0.14, 0.12, 0.08, 0.04]
    Dalph: 6.0
    sigma_eta_sort: 0.60
    old_bldg_cutoff_year: 1940
    new_bldg_cutoff_year: 2000
    m0: 0.1826835
    bM_theta: -0.20
    bM_old: 0.15
    bM_new: 0.25
    bM_C: 0.12
    aC: -2.10
    bC_theta: 0.35
    bC_s_bad: -0.10
    bC_old: 0.10
    bC_new: -0.05
    bC_M: -0.10
    aF: -3.00
    bF_theta: 0.70
    # Filing is a single-intensity Poisson block:
    # log(fbar) = aF + bF_theta*1{theta=B} + bF_delta*delta_bar
    bF_delta: 1.10
    high_filing_threshold: 0.15
    xi_bracket: [-40, 40]
    calibration:
      target_product_key: "outer_sorting_empirical_moments"
      params: ["Dalph", "sigma_eta_sort", "p_bad_shape1", "p_bad_shape2", "aF", "bF_theta", "bF_delta", "aC", "bC_theta", "bC_s_bad", "bC_old", "bC_new", "bC_M", "m0", "bM_theta", "bM_old", "bM_new", "bM_C"]
      moment_cols:
        - "mean_f_rate"
        - "mean_m_rate"
        - "mean_c_rate"
        - "mean_m_rate_pos"
        - "m_rate_pos_p50"
        - "m_rate_pos_p90"
        - "nhood_mean_s_sd"
        - "nhood_mean_s_p90_p10"
        - "nhood_mean_f_rate_sd"
        - "nhood_mean_f_rate_p90_p10"
        - "sorting_coef_high_filing_nhood"
        - "sorting_coef_high_bin_nhood"
        - "beta_ppml_s"
        - "beta_ppml_s_x_high_filing"
        - "beta_maint_on_c_rate"
        - "filing_resid_sd_nhood_fe"
      weights:
        mean_f_rate: 10
        mean_m_rate: 10
        mean_c_rate: 10
        mean_m_rate_pos: 5
        m_rate_pos_p50: 5
        m_rate_pos_p90: 5
        nhood_mean_s_sd: 8
        nhood_mean_s_p90_p10: 8
        nhood_mean_f_rate_sd: 5
        nhood_mean_f_rate_p90_p10: 5
        sorting_coef_high_filing_nhood: 5
        sorting_coef_high_bin_nhood: 5
        beta_ppml_s: 2
        beta_ppml_s_x_high_filing: 2
        filing_resid_sd_nhood_fe: 5
        beta_maint_on_c_rate: 3
      high_filing_threshold: 0.15
      maxit: 300
      reltol: 1.0e-04
      grid_Dalph: [2, 4, 6, 8, 10]
      bounds:
        Dalph: [0.05, 50]
        sigma_eta_sort: [0, 5]
        p_bad_shape1: [0.2, 20]
        p_bad_shape2: [0.2, 20]
        aF: [-8, 2]
        bF_theta: [-2, 2]
        bF_delta: [0, 10]
        aC: [-6, 2]
        bC_theta: [-2, 2]
        bC_s_bad: [-2, 2]
        bC_old: [-2, 2]
        bC_new: [-2, 2]
        bC_M: [-2, 0]
        m0: [1.0e-04, 5]
        bM_theta: [-2, 2]
        bM_old: [-2, 2]
        bM_new: [-2, 2]
        bM_C: [0, 2]
    empirical:
      bldg_panel_product_key: "bldg_panel_blp"
      composition_product_key: "infousa_building_income_proxy_panel"
      composition_proxy_col: "infousa_find_low_income_share"
      composition_weight_col: "infousa_num_households_income_proxy"
      composition_source_col: "infousa_income_proxy_source"
      year_from: 2011
      year_to: 2019
      maintenance_count_col: "total_permits"
      complaint_count_col: "total_complaints"
      filing_count_col: "num_filings"
      units_col: "total_units"
      geoid_col: "GEOID"
      pid_col: "PID"
      year_built_col: "year_built"
      high_filing_threshold: 0.15
    recovery:
      n_rep: 20
      seed: 20260307
      params: ["Dalph", "bF_delta", "bF_theta", "bC_s_bad", "bM_C"]
      truth_bounds:
        Dalph: [3, 10]
        bF_delta: [0.3, 2.5]
        bF_theta: [0.2, 1.2]
        bC_s_bad: [-0.8, 0.2]
        bM_C: [0.02, 0.4]
    income_proxy:
      infousa_product_key: "infousa_clean"
      xwalk_product_key: "xwalk_infousa_to_parcel"
      income_col: "find_div_1000"
      address_col: "n_sn_ss_c"
      household_id_col: "familyid"
      primary_flag_col: "primary_family_ind"
      year_col: "year"
      year_from: 2011
      year_to: 2019
      low_income_threshold_k: 30

# ============================================================
# RACE PRIORS SETTINGS
# ============================================================
race_priors:
  # Default ACS year for race priors builds and downstream prior file selection.
  year: 2013
  # Geography used to fetch/build priors from ACS.
  # One of: block, block_group, tract
  build_geography: "block_group"
  # Geography written to xwalk output files.
  # One of: block, block_group, tract
  output_geography: 'block_group'
  # Used by build-tract-race-priors_renter.R
  # One of: renter, totalpop
  prior_type: "renter"
  # For block-group inference in impute-race.R:
  # shrink low-N BG priors toward tract means to reduce extreme/noisy priors.
  bg_shrink_enabled: true
  bg_shrink_min_n: 100
  bg_shrink_k: 100

# ============================================================
# SPATIAL SETTINGS
# ============================================================
spatial:
  # If you are building hex panels
  h3_resolution: 9
  time_unit: "year_quarter"  # one of: year, year_quarter, month
